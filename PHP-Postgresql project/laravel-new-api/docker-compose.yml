version: '1'

services:
  laravelapp:
    container_name: laravelapp
    restart: unless-stopped
    image: 'khushi/laravelapp/1.0.0'
    build: .
    ports:
      - '8000:8000'
    env_file:
      - .env
    depends_on:
      - db
  db:
    container_name: db
    restart: unless-stopped
    image: 'postgres:12'
    ports:
      - '5432:5432'
    env_file:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - db_data:/var/lib/postgresql/data
volumes:
  pgdata: {}