<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    
    .container{
      display:flex;
      justify-content: center;
      height:100vh;
      align-items: center;
    }
    .grid-container{
      display: grid;
      gap:9px;
      grid-template-columns:320px 198px 153px 50px;
      grid-template-rows:414px 130px 155px 20px;
      height:748px;
      width:748px;
      background-color: black;
      text-align: center;
      font-family: 'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif;
      font-style: oblique;
      font-weight: bold;
    }
    
    .grid-item1{
      background-color: #E72F24;
      color: #F0F1EC;
    }
    
    .grid-item2{
      background-color: #F0F1EC ;
      grid-area:1/2/2/5;
    }
    
    .grid-item3{
      background-color: #F0F1EC ;
      grid-area: 2/1/4/2;
    }
    .grid-item4{
      background-color: #F0F1EC ;
      grid-row: span 2;
      grid-column:span 2;
    }
    .grid-item5{
      background-color: blue;
      border-bottom: 10px solid black;
    }
   
    .grid-item6{
      background-color: #F0F1EC;
      grid-row:span 2 ;
    }
    .grid-item7{
      background-color: #F0F1EC;
    }
    
    .grid-item8{
      background-color: yellow;
    }
    
    .grid-item9{
      background-color:  #232629;
    }





    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
  </style>
</head>

<body>
  <div class="container">
   <div class="grid-container" >
   <div class="grid-item1" >YOU</div>
   <div class="grid-item2" >ARE</div>
   <div class="grid-item3" >FANTASTIC</div>
   <div class="grid-item4" >GO</div>
   <div class="grid-item5" >ROCK</div>
   <div class="grid-item6" >CHAMP</div>
   <div class="grid-item7" >ALL</div>
   <div class="grid-item8" >THE</div>
   <div class="grid-item9" >BEST</div>
   </div>
  </div>

</body>

</html>
